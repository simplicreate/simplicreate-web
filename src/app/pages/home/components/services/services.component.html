<div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto px-4 py-12 items-center">
  @for (e of services; track e.id) {
    <div
      (click)="setActive(e.id)"
      (mouseenter)="setHovered(e.id)"
      (mouseleave)="setHovered(null)"
      [ngClass]="visualActiveId === e.id
        ? 'border-[#11D6C3] scale-105 z-20 opacity-100 shadow-[0_0_50px_rgba(17,214,195,0.25)] bg-white/[0.05]'
        : 'border-white/10 scale-95 opacity-40 z-10 grayscale'"
      class="group relative cursor-pointer transition-all duration-500 ease-in-out border rounded-3xl p-8 bg-[#070B14] flex flex-col h-full">

      @if (getEngagementTag(e)) {
        <div class="absolute -top-3 left-1/2 -translate-x-1/2 z-30">
          <span class="text-[10px] font-black uppercase tracking-widest bg-[#11D6C3] text-[#070B14] px-3 py-1 rounded-full whitespace-nowrap">
            {{ getEngagementTag(e) }}
          </span>
        </div>
      }

      <h3 class="text-white font-bold text-xl mb-3">{{ e?.name }}</h3>
      <p class="text-white/70 text-sm leading-relaxed mb-6">{{ e?.subtitle }}</p>
      
      <ul class="space-y-3 flex-1">
        @for (bullet of e?.bullets; track bullet) {
          <li class="flex items-start gap-2 text-xs text-white/60">
            <span class="text-[#11D6C3]">✓</span> {{ bullet }}
          </li>
        }
      </ul>

      <div class="mt-8 text-center h-4">
        <span
          [class.opacity-100]="activeEngagementId === e.id"
          [class.opacity-0]="activeEngagementId !== e.id"
          class="text-[10px] font-bold uppercase tracking-widest text-[#11D6C3] transition-opacity duration-300">
          ✓ Selected
        </span>
      </div>
    </div>
  }
</div>
