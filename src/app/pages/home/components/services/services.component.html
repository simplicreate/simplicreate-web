<section id="services" class="scroll-mt-24">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto px-4 py-12 items-center">
    @for (e of services; track e.id) {
      <div
        (click)="setActive(e.id)"
        (mouseenter)="setHovered(e.id)"
        (mouseleave)="setHovered(null)"
        [ngClass]="
          visualActiveId === e.id
            ? 'border-[#11D6C3] scale-105 z-20 opacity-100 shadow-[0_0_50px_rgba(17,214,195,0.25)] bg-white/[0.05]'
            : 'border-white/10 scale-95 opacity-70 z-10 grayscale'
        "
        class="group relative cursor-pointer transition-all duration-500 ease-in-out border rounded-3xl p-8 bg-[#070B14] flex flex-col h-full"
      >
        @if (getEngagementTag(e)) {
          <div class="absolute -top-3 left-1/2 -translate-x-1/2 z-30">
            <span
              class="text-[10px] font-black uppercase tracking-widest bg-[#11D6C3] text-black px-3 py-1 rounded-full whitespace-nowrap"
            >
              {{ getEngagementTag(e) }}
            </span>
          </div>
        }

        <h2 class="text-white font-bold text-2xl mb-2">{{ e.name }}</h2>

        <div class="text-[#11D6C3] text-xs font-bold tracking-wide mb-4">
          {{ e.subtitle }}
        </div>

        <p class="text-white/80 text-sm leading-relaxed mb-6 whitespace-pre-line">
          {{ e.description }}
        </p>

        <ul class="space-y-3 flex-1 mb-8">
          @for (bullet of e.bullets; track bullet) {
            <li class="flex items-start gap-2 text-xs text-white/80">
              <span class="text-[#11D6C3] shrink-0 mt-0.5">✓</span>
              <span>{{ bullet }}</span>
            </li>
          }
        </ul>

        <div class="mt-8">
          <button
            (click)="scrollToContact(e.id); $event.stopPropagation()"
            [ngClass]="
              activeEngagementId === e.id
                ? 'bg-[#11D6C3] text-black shadow-[0_0_20px_rgba(17,214,195,0.4)]'
                : 'bg-white/10 text-white hover:bg-white/20'
            "
            class="w-full py-3 px-4 rounded-xl font-bold text-sm transition-all duration-300"
          >
            {{ getButtonText(e.id) }}
          </button>
        </div>
      </div>
    }
  </div>
</section>
